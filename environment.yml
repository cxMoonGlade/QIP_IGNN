# GPU training env: conda supplies Python + pip; CUDA PyTorch/PyG come from requirements_lock.txt.
#
#   conda env create -f environment.yml
#   conda activate qignn2-gpu
#   bash install_gpu_lock.sh
#
# Requirements: NVIDIA driver new enough for CUDA 12.8 user-mode stack (bundled via pip nvidia-* wheels).

name: qignn2-gpu
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
